apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pgvector
  namespace: info
spec:
  serviceName: pgvector-svc
  replicas: 1
  selector:
    matchLabels:
      app: pgvector
  template:
    metadata:
      labels:
        app: pgvector
    spec:
      containers:
      - name: pgvector
        image: pgvector/pgvector:pg16
        env:
        - name: POSTGRES_DB
          value: techseminar2_db
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: pgvector-svc
  namespace: info
spec:
  selector:
    app: pgvector
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP
