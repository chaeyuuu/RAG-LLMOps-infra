apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: core
spec:
  serviceName: mysql-svc
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: mydlcodb2004!
        - name: MYSQL_DATABASE
          value: techseminar2_db
        ports:
        - containerPort: 3306
        args:
        - --character-set-server=utf8mb4
        - --collation-server=utf8mb4_unicode_ci
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
  namespace: core
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  type: ClusterIP
