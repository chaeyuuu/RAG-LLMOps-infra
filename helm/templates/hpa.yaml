apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: techseminar2-hpa
  namespace: channel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: techseminar2-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
