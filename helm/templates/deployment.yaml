apiVersion: apps/v1
kind: Deployment
metadata:
  name: techseminar2-api
  namespace: channel
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: techseminar2-api
  template:
    metadata:
      labels:
        app: techseminar2-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: techseminar2-api
          image: {{ .Values.app.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.app.port }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"

            # --- 1. MySQL (DataSourceConfig용) ---
            - name: spring.datasource.url
              value: "jdbc:mysql://{{ .Values.mysql.host }}:{{ .Values.mysql.port }}/{{ .Values.mysql.database }}?useSSL=false&allowPublicKeyRetrieval=true"
            - name: spring.datasource.username
              valueFrom:
                secretKeyRef:
                  name: techseminar2-secret
                  key: MYSQL_USERNAME
            - name: spring.datasource.password
              valueFrom:
                secretKeyRef:
                  name: techseminar2-secret
                  key: MYSQL_PASSWORD

            # --- 2. PostgreSQL (CoreDataSourceConfig용) ---
            - name: core.datasource.url
              value: "jdbc:postgresql://{{ .Values.pgvector.host }}:{{ .Values.pgvector.port }}/{{ .Values.pgvector.database }}"
            - name: core.datasource.username
              valueFrom:
                secretKeyRef:
                  name: techseminar2-secret
                  key: PGVECTOR_USERNAME
            - name: core.datasource.password
              valueFrom:
                secretKeyRef:
                  name: techseminar2-secret
                  key: PGVECTOR_PASSWORD

            # --- 3. PGVector (PgVectorConfig용 - ★현재 에러 지점) ---
            - name: pgvector.datasource.url
              value: "jdbc:postgresql://{{ .Values.pgvector.host }}:{{ .Values.pgvector.port }}/{{ .Values.pgvector.database }}"
            - name: pgvector.datasource.username
              valueFrom:
                secretKeyRef:
                  name: techseminar2-secret
                  key: PGVECTOR_USERNAME
            - name: pgvector.datasource.password
              valueFrom:
                secretKeyRef:
                  name: techseminar2-secret
                  key: PGVECTOR_PASSWORD

            # --- 4. 기타 인프라 ---
            - name: REDIS_HOST
              value: {{ .Values.redis.host }}
            - name: OLLAMA_HOST
              value: {{ .Values.ollama.host }}

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60  # 좀 더 여유 있게 잡았습니다
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 100
            periodSeconds: 15

          volumeMounts:
            - name: prompt-config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: prompt-config
          configMap:
            name: prompt-config