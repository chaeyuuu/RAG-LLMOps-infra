apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: techseminar2-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: techseminar2-api
  namespaceSelector:
    matchNames:
    - channel
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 15s
